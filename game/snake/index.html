<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>貪食蛇｜Free Web Games Hub</title>
    <meta name="description" content="經典貪食蛇網頁版，支援鍵盤 WASD 與方向鍵操作。" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8908217023822331"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./game.css" />
  </head>
  <body>
    <div class="top-strip">
      <div class="page-wrap top-strip-inner">
        <nav class="top-bar" aria-label="主選單">
          <a class="icon-button" href="../../index.html" aria-label="返回主頁">
            <img src="../../assets/icon_main-menu.png" alt="" />
          </a>
        </nav>
      </div>
    </div>

    <main class="page-wrap game-page">
      <aside class="card side-ad" aria-label="左側廣告">
        <!-- Multimedia advertising -->
        <ins
          class="adsbygoogle"
          style="display: block"
          data-ad-client="ca-pub-8908217023822331"
          data-ad-slot="7095251020"
          data-ad-format="auto"
          data-full-width-responsive="true"
        ></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </aside>

      <section class="card game-stage" aria-label="遊戲畫面">
        <div class="hud">
          <div>模式：<span id="modeName">🎯 經典圖</span></div>
          <div>分數：<span id="score">0</span></div>
          <div>本模式最高：<span id="best">0</span></div>
          <div>速度：<span id="speed">7</span></div>
        </div>
        <div class="hud-rank" id="rankBoard">
          排行榜：⚡ <span id="bestLightning">0</span> ｜ 🎯 <span id="bestClassic">0</span> ｜ 🌍
          <span id="bestEarth">0</span>
        </div>

        <div class="canvas-wrap prelaunch" id="gameViewport">
          <canvas id="game" width="640" height="640" aria-label="貪食蛇遊戲"></canvas>
          <div class="overlay" id="overlay">
            <h1 id="overlayTitle">🍎 貪食蛇</h1>
            <p id="overlayDesc">開始前請先選擇地圖模式，再按「開始遊戲」。</p>

            <div class="mode-picker" id="modePicker" role="group" aria-label="地圖模式選擇">
              <button type="button" class="mode-btn" data-mode="lightning">⚡小地圖</button>
              <button type="button" class="mode-btn is-active" data-mode="classic">🎯 經典圖</button>
              <button type="button" class="mode-btn" data-mode="earth">🌍 大地圖</button>
            </div>
            <p class="mode-note" id="modeNote">標準玩法-速度7</p>

            <button id="startBtn" type="button">開始遊戲</button>
          </div>
        </div>
      </section>

      <section class="card game-info" aria-labelledby="game-info-title">
        <h2 id="game-info-title">🍎 貪食蛇</h2>
        <p>吃到食物就會加分並變長，撞到牆壁或自己的身體就結束。</p>
        <p>操作：W / A / S / D 或 ↑ / ← / ↓ / →。</p>
      </section>
    </main>

    <div class="ad-break-modal" id="adBreakModal" hidden>
      <div class="ad-break-panel" role="dialog" aria-modal="true" aria-label="廣告視窗">
        <h3 id="adBreakTitle">遊戲加載中</h3>
        <!-- Multimedia advertising -->
        <ins
          class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-8908217023822331"
          data-ad-slot="7095251020"
          data-ad-format="auto"
          data-full-width-responsive="true"
        ></ins>
        <button id="adBreakContinueBtn" type="button">5秒後自動關閉</button>
      </div>
    </div>

    <footer class="site-footer">
      <div class="page-wrap">
        <small>© 2026 Tu Free Games</small>
      </div>
    </footer>

    <script src="./game.js"></script>
  </body>
</html>
