<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>免費小遊戲｜Free Web Games Hub</title>
    <meta
      name="description"
      content="各種類型免費小遊戲、免費線上遊戲、免費遊戲平台。免下載、即開即玩，支援手機與桌機。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="免費小遊戲｜Free Web Games Hub" />
    <meta
      property="og:description"
      content="收錄各種類型免費小遊戲與免費線上遊戲，免下載、即開即玩。"
    />
    <meta property="og:image" content="https://tufreegames.github.io/og-cover.png" />
    <meta property="og:url" content="https://tufreegames.github.io/" />
<link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "免費小遊戲清單",
        "itemListOrder": "https://schema.org/ItemListOrderAscending",
        "numberOfItems": 3,
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "渡劫修仙",
            "url": "https://tufreegames.github.io/game/tribulation-ascension/",
            "description": "左右移動閃避落雷，突破境界並強化天賦。"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "貪食蛇",
            "url": "https://tufreegames.github.io/game/snake/",
            "description": "經典貪食蛇，支援 WASD 與方向鍵。"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "俄羅斯方塊",
            "url": "https://tufreegames.github.io/game/tetris/",
            "description": "經典 Tetris，7-bag、等級速度曲線與乾淨手感。"
          }
        ]
      }
    </script>
  </head>
  <body id="top">
    <div class="top-strip">
      <div class="container top-strip-inner">
        <nav class="top-bar" aria-label="主選單">
          <a class="icon-button" href="./index.html" aria-label="返回主頁">
            <img src="./assets/icon_main-menu.png" alt="" />
          </a>
        </nav>
      </div>
    </div>

    <header class="site-header">
      <div class="container hero-layout">
        <section class="hero-copy" aria-label="首頁主視覺">
          <h1>免費小遊戲｜Free Web Games Hub</h1>
          <p class="hero-tagline">免下載・各種類型免費線上遊戲即開即玩</p>
          <p class="hero-subtitle">
            這裡收錄各種類型免費小遊戲與免費線上遊戲，支援手機與桌機，開啟網頁即可直接遊玩。
          </p>
        </section>
        <div class="hero-tech-pattern" aria-hidden="true"></div>
      </div>
    </header>

    <main class="container">
      <section class="card" id="game-list" aria-labelledby="game-list-title">
        <h2 id="game-list-title">遊戲列表</h2>
        <div class="game-grid">
          <article class="game-card game-card-media">
            <a class="game-link" href="./game/tribulation-ascension/" aria-label="開始遊玩渡劫修仙">
              <img
                class="game-thumb"
                src="./assets/game-icon_tribulation-ascension.png"
                alt="渡劫修仙遊戲圖示"
              />
              <h3>渡劫修仙</h3>
            </a>
          </article>

          <article class="game-card game-card-media">
            <a class="game-link" href="./game/snake/" aria-label="開始遊玩貪食蛇">
              <img class="game-thumb" src="./assets/game-icon_snake.png" alt="貪食蛇遊戲圖示" />
              <h3>貪食蛇</h3>
            </a>
          </article>

          <article class="game-card game-card-media">
            <a class="game-link" href="./game/tetris/" aria-label="開始遊玩俄羅斯方塊">
              <img class="game-thumb" src="./assets/game-icon_tetra.png" alt="俄羅斯方塊遊戲圖示" />
              <h3>俄羅斯方塊</h3>
            </a>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
<small>© 2026 Tu Free Games</small>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
